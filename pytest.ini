[pytest]
# 命令行默认参数：生成 Allure 测试结果，并在每次运行前清空历史记录
addopts = -vs -q --alluredir=./report/allure-results --clean-alluredir

# 测试用例路径匹配规则
testpaths = test_cases

# 测试文件命名规则
python_files = test_*.py

# 测试类与函数命名规则
python_classes = Test*
python_functions = test_*

markers =
    live_platform: 依赖真实 Android/iOS/Web 环境的回放测试
